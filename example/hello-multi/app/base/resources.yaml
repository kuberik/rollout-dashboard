metadata:
  name: hello-worker
  annotations:
    rollout.kuberik.io/step-1-ready-timeout: "10m"
    rollout.kuberik.io/step-1-bake-time: "30s"
    rollout.kuberik.io/step-2-ready-timeout: "10m"
    rollout.kuberik.io/step-2-bake-time: "30s"
    rollout.kuberik.io/step-3-ready-timeout: "10m"
    rollout.kuberik.io/step-3-bake-time: "30s"
spec:
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-worker
  strategy:
    canary:
      steps:
        - replicas: 1
        - replicas: 2
        - replicas: 3
        - replicas: 100%
---
