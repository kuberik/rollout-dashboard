kind: RolloutTest
metadata:
  name: hello-worker-test
  labels:
    app: hello-multi
spec:
  rolloutName: hello-worker
  stepIndex: 1
  jobTemplate:
    backoffLimit: 1
    template:
      spec:
        restartPolicy: Never
        containers:
          - name: test
            image: curlimages/curl:8.10.1
            command: ["sh", "-c"]
            args:
              - |
                set -eu
                sleep 5
                for i in 1 2 3 4 5; do
                  if curl -fsS http://hello-worker/; then
                    exit 0
                  fi
                  sleep 3
                done
                exit 1
