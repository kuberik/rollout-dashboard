---
# PrometheusRule for hello-world alerts
# This resource is used by the Prometheus Operator (kube-prometheus-stack)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hello-world-alerts
  namespace: hello-world
  labels:
    prometheus: kube-prometheus-stack
    role: alert-rules
spec:
  groups:
    - name: hello-world-alerts
      interval: 15s
      rules:
        # Alert when error rate is high
        - alert: HighErrorRate
          expr: |
            rate(http_errors_total[1m]) > 0.1
          for: 1m
          labels:
            severity: critical
            app: hello-python
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }} for pod {{ $labels.kubernetes_pod_name }}"

        # Alert when request rate is too low (app might be down)
        - alert: LowRequestRate
          expr: |
            rate(http_requests_total[1m]) < 0.01
          for: 2m
          labels:
            severity: warning
            app: hello-python
          annotations:
            summary: "Low request rate detected"
            description: "Request rate is {{ $value }} req/s for pod {{ $labels.kubernetes_pod_name }}"

        # Alert when app is down
        - alert: AppDown
          expr: |
            up{job="kubernetes-pods", app="hello-python"} == 0
          for: 1m
          labels:
            severity: critical
            app: hello-python
          annotations:
            summary: "Application is down"
            description: "Pod {{ $labels.kubernetes_pod_name }} is not responding to scrapes"
---
# ServiceMonitor for hello-world app
# This resource tells Prometheus Operator how to scrape the hello-python app
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hello-python
  namespace: hello-world
  labels:
    prometheus: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: hello-python
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
