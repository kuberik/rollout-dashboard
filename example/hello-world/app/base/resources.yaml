---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-python-script
data:
  app.py: |
    import os
    import random
    import time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from threading import Lock

    VERSION = os.environ.get("VERSION", "unknown")
    LOREM = "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.".split()

    # Simple metrics storage
    class Metrics:
        def __init__(self):
            self.lock = Lock()
            self.request_count = 0
            self.request_duration_sum = 0
            self.error_count = 0
            self.start_time = time.time()

        def inc_requests(self):
            with self.lock:
                self.request_count += 1

        def add_duration(self, duration):
            with self.lock:
                self.request_duration_sum += duration

        def inc_errors(self):
            with self.lock:
                self.error_count += 1

        def get_metrics(self):
            with self.lock:
                uptime = time.time() - self.start_time
                return {
                    "request_count": self.request_count,
                    "request_duration_sum": self.request_duration_sum,
                    "error_count": self.error_count,
                    "uptime": uptime
                }

    metrics = Metrics()

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            start = time.time()

            if self.path == "/metrics":
                # Prometheus metrics endpoint
                m = metrics.get_metrics()
                self.send_response(200)
                self.send_header("Content-type", "text/plain; version=0.0.4")
                self.end_headers()

                output = f"""# HELP http_requests_total Total number of HTTP requests
    # TYPE http_requests_total counter
    http_requests_total{{version="{VERSION}"}} {m['request_count']}

    # HELP http_request_duration_seconds_sum Sum of HTTP request durations
    # TYPE http_request_duration_seconds_sum counter
    http_request_duration_seconds_sum{{version="{VERSION}"}} {m['request_duration_sum']:.6f}

    # HELP http_errors_total Total number of HTTP errors
    # TYPE http_errors_total counter
    http_errors_total{{version="{VERSION}"}} {m['error_count']}

    # HELP process_uptime_seconds Process uptime in seconds
    # TYPE process_uptime_seconds gauge
    process_uptime_seconds{{version="{VERSION}"}} {m['uptime']:.2f}
    """
                self.wfile.write(output.encode())
            else:
                # Regular endpoint
                try:
                    metrics.inc_requests()
                    print(" ".join(random.sample(LOREM, random.randint(1, len(LOREM)))))
                    self.send_response(200)
                    self.send_header("Content-type", "text/plain")
                    self.end_headers()
                    self.wfile.write(f"Hello, World!\nVersion: {VERSION}\n".encode())
                except Exception as e:
                    metrics.inc_errors()
                    raise
                finally:
                    duration = time.time() - start
                    metrics.add_duration(duration)

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", 8080))
        server = HTTPServer(("", port), Handler)
        print(f"Serving on port {port}")
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-python
  labels:
    app: hello-python
spec:
  minReadySeconds: 15
  replicas: 2
  selector:
    matchLabels:
      app: hello-python
  template:
    metadata:
      labels:
        app: hello-python
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: python-server
          image: ghcr.io/littlechimera/hello-world/app:${HELLO_WORLD_VERSION}
          command: ["python", "/app/app.py"]
          env:
            - name: VERSION
              value: ${HELLO_WORLD_VERSION}
            - name: PORT
              value: "8080"
            - name: DD_SERVICE
              value: hello-python
            - name: DD_ENV
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app-script
              mountPath: /app/app.py
              subPath: app.py
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 1
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
      volumes:
        - name: app-script
          configMap:
            name: hello-python-script
---
apiVersion: rollouts.kruise.io/v1beta1
kind: Rollout
metadata:
  name: hello-python
  annotations:
    rollout.kuberik.io/step-1-ready-timeout: "10m"
    rollout.kuberik.io/step-1-bake-time: "30s"
    rollout.kuberik.io/step-2-ready-timeout: "10m"
    rollout.kuberik.io/step-2-bake-time: "30s"
spec:
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-python
  strategy:
    canary:
      steps:
      - replicas: 1
        traffic: 20%
      - replicas: 2
      - replicas: 100%
      trafficRoutings:
        - service: hello-python
          gateway:
            httpRouteName: hello-python
---
apiVersion: rollout.kuberik.com/v1alpha1
kind: RolloutTest
metadata:
  name: hello-python-test
  labels:
    app: hello-python
spec:
  rolloutName: hello-python
  stepIndex: 1
  jobTemplate:
    backoffLimit: 1
    template:
      spec:
        restartPolicy: Never
        containers:
          - name: hello-python-test
            image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
            args: ["uv", "run", "/app/test.py"]
            env:
              - name: PORT
                value: "80"
            volumeMounts:
              - name: app-test-script
                mountPath: /app/test.py
                subPath: test.py
        volumes:
          - name: app-test-script
            configMap:
              name: hello-python-test-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-python-test-script
data:
  test.py: |
    # /// script
    # requires-python = ">=3.12"
    # dependencies = [
    #     "requests>=2.32.0",
    # ]
    # ///
    import os
    import requests
    import time

    def main():
      time.sleep(15)
      service_host = os.environ.get("SERVICE_HOST", "hello-python-canary")
      service_port = int(os.environ.get("PORT", "80"))
      url = f"http://{service_host}:{service_port}/"
      try:
        resp = requests.get(url, timeout=5)
        print("Response:", resp.status_code, resp.text)
        if resp.status_code != 200:
          print("Request failed")
          exit(1)
      except Exception as e:
        print("Request error:", e)
        exit(1)

    if __name__ == "__main__":
      main()
---
apiVersion: v1
kind: Service
metadata:
  name: hello-python
  labels:
    app: hello-python
spec:
  selector:
    app: hello-python
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hello-python-gateway
  namespace: hello-world
  labels:
    app: hello-python
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: hello-python.example.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-python
  namespace: hello-world
  labels:
    app: hello-python
spec:
  parentRefs:
    - name: hello-python-gateway
  hostnames:
    - hello-python.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello-python
          port: 80
---
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: hello-python-monitor
  namespace: hello-world
  annotations:
    kuberik.com/health-check: "true"
  labels:
    app.kubernetes.io/name: hello-python-monitor
    app.kubernetes.io/part-of: rollout-dashboard
    app.kubernetes.io/managed-by: kubectl
    app: hello-python
spec:
  message: "Auto-generated monitor for hello-python"
  query: "avg(last_1m):avg:system.cpu.idle{*} by {host} > 90"
  tags:
    - "env:dev"
  type: metric alert
  name: hello-python-monitor
